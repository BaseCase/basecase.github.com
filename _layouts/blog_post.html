<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }} - Casey Brant's blog</title>
    <link rel="stylesheet" type="text/css" href="//fonts.googleapis.com/css?family=Open+Sans" />
    <link rel="stylesheet" href="/css/style.css">
  </head>

  <body class="blog-post">
    <header>
      <a href="/">
        <img class="headshot" src="/img/avatar.jpg">
        <h1>Casey Brant</h1>
      </a>
    </header>

    <main>
      <article>
        {{ content }}
      </article>

      <section class="postlude">
        <p>
          Hey, thanks for reading.
          I don’t have comments on my blog, but I’d still love to hear from you.
          These are the best ways to reach me:
        </p>

        <ul>
          <li><a href="https://twitter.com/basecase">Tweet at me</a></li>
          <li><a href="mailto:casey@caseybrant.com">Email me</a></li>
        </ul>

        <p>Or, <a href="/">check out my other posts and projects.</a></p>
      </section>
    </main>

    <footer>
      &copy; 2016–2019 Casey Brant
    </footer>

    <script>
        (function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
        (i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
        m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
        })(window,document,'script','https://www.google-analytics.com/analytics.js','ga');
        ga('create', 'UA-56724335-1', 'auto');
        ga('send', 'pageview');
    </script>
  </body>
</html>
