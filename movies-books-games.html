<div class="container">

  <h1>Movies, Books, and Games</h1>

  <p>Here's a list of all the movies, books, and games I've gone through in 2016 with one or two sentences about what I thought of them.</p>

  <div id="mbg-list">

    <div id="mbg-header" class="mbg-entry">
      <div class="mbg-cell title">Title</div>
      <div class="mbg-cell type">Type</div>
      <div class="mbg-cell date-completed">Date Completed</div>
      <div class="mbg-cell thoughts">Thoughts</div>
    </div>

    <div class="mbg-entry">
      <div class="mbg-cell title">
        <a href="http://www.imdb.com/title/tt0241527/">
          <img src="mbg/hp_sorcerer.jpg">
          Harry Potter and the Sorcerer's Stone
        </a>
      </div>
      <div class="mbg-cell type">Movie</div>
      <div class="mbg-cell date-completed">Jan. 03, 2016</div>
      <div class="mbg-cell thoughts">It was OK!</div>
    </div>
  </div>
</div>
