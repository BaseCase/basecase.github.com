-
  title: Root
  type: tabletop
  plays:
    - 2019-02-02
  image_url:
  thoughts: >
    I’ve never seen a game this drastically asymmetric that worked so well. Each faction in the game plays *wildly* different, but somehow it all coheres into a single, surprisingly tight game experience. Pretty steep learning curve, but absolutely worth it. I hope to come back to this one many times.

-
  title: Love Letter
  type: tabletop
  plays:
    - 2019-02-02
  image_url:
  thoughts: >
    A true classic. Easy to teach, easy to set up, quick to play, but satisfyingly deep strategy. A great game to occupy a “filler” spot in the day, but of much higher quality than a normal filler game.

-
  title: Dice Throne
  type: tabletop
  plays:
    - 2019-02-02
  image_url:
  thoughts: >
    Hmm, not sure about this one. This is basically Yahtzee with some D&D-esque mechanics layered on top of it. I love rolling dice, and this game delivers lots of that, but the outcomes seem maybe a bit *too* random for a competitive game. Decently fun, in spite of that.

