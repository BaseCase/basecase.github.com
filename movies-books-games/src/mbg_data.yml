  title: Day of the Tentacle Remastered
  type: game
  author: Double Fine Games
  completion_date: 2017-02-19
  image_url: 'img/day_of_the_tentacle.jpg'
  thoughts: >
    Oof. This one really shows its age.
    The writing itself is quite funny, but the comedic timing is ruined by what I assume are technological limitations from the era in which the game was originally developed.
    I couldn't make it more than half an hour in before the sluggish pace of everything just got too annoying and I had to stop.
    No doubt if I had gotten to this title as a kid I'd love it as much as everyone else, but it's not grabbing me as an adult.

-
  title: Getting Things Done (2nd ed.)
  type: book
  author: David Allen
  completion_date: 2017-02-22
  image_url: 'img/gtd.jpg'
  thoughts: >
    I read the first edition of Getting Things Done almost a decade ago, and it completely changed how I think about and approach productivity.
    When I saw that there was a revised edition, I took it as a good opportunity to refresh my memory of this life-changing book.
    I have to admit that I don't remember my first reading well enough to know what's different in this edition.
    It seems largely the same, though I'm sure there are plenty of changes I just didn't notice.
    If you've never read GTD before, I can't recommend it enough; if you have read it, I don't think this edition offers anything new in the way of concepts, but it might be worth it to refresh your memory.

