    I'm not normally a huge fan of popular science nonfiction (unless you count Cosmos),
    but this title came up in an Ars Technica article so I figured I'd give it a try.
    While well-written and about interesting stuff, I'm still just not that into the genre.
    If you are, though, it's good!





