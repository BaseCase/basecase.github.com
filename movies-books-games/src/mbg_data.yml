  thoughts: >
    This is a thoughtful look at the landscape of agile software development literature. I think the chief contribution of this book is the exhortation—and examples of how—to think critically and carefully about the various techniques and project management principles defined by things like Scrum. There is a lot in the agile world to criticize, and Meyer does it well. He does fall victim to some of the same fuzzy thinking he criticizes, but on balance, this is a worthwhile read.

