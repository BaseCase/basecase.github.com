-
  title: Pan’s Labyrinth
  type: movie
  watched: 2019-01-09
  image_url: blarp
  thoughts: >
    Holy cow, this was a heavy movie. I was expecting the post-civil-war Spain stuff to be kind of a light frame story around mostly the fantasy stuff, but that was not the case at all. The interplay between the two worlds, and the fact that the fantasy things were not an “escape” from Ofelia’s reality but more like an echo of it, made this one of the most immersive dark fantasy movies I’ve ever seen. Also Del Toro’s visual sense is just unmatched.

-
  title: Spider-Man: Into the Spider-Verse
  type: movie
  watched: 2019-01-19
  image_url:
  thoughts: >
    So awesome! I’ve gotten kind of sick of superhero movies, but this was such a fresh and stylish take on the genre that I loved it. Incredible visuals, really smart script, and a sweet soundtrack.

