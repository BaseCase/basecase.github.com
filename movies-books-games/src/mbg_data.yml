-
  title: "Eldritch"
  type: game
  author: David Pittman
  completion_date: 2017-06-17
  image_url: 'img/eldritch.jpg'
  thoughts: >
    A first-person, roguelike, Lovecraftian adventure.
    In theory, this game has all things that I love, so I should love it.
    It just didn’t work for me though, for some reason.
    I think maybe the level generation achieves the whole “disorienting weird geometry” Lovecraft thing a little <em>too</em> well,
    and it winds up just being confusing to wander the stages.
    I also wish there was a bit more in the way of monster AI.
    Lovecraft stories are often about hiding and avoiding rather than head-on combat, but in this game everything just comes right at you and there’s little choice.
    I may come back and give it another try in the future, because like I said, this should be a great game for me.

