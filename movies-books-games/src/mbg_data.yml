  type: book
  author: Charles Duhigg
  completion_date: 2017-05-24
  image_url: 'img/power_of_habit.jpg'
  thoughts: >
    The first portion of this book, about how habits form in the brain and how to manage them, is some of the most valuable pop-sci I’ve ever read.
    I’ll be applying and benefitting from these lessons for the rest of my life.
    The later sections, once it starts to drift into organizational theory, are a little shakier and less useful.
    I’d recommend just reading the first 1/3 of this book and calling it there, and if you do that, you’ll find incredibly useful advice.


