  title: "Dishonored"
  type: game
  author:
  completion_date: 2017-07-03
  image_url: 'img/dishonored.jpg'
  thoughts: >
    This is the third or fourth time I’ve tried to play this game.
    I never liked it before because I didn’t realize it was primarily a stealth game, but this time I played it right and loved it.
    The other thing I did differently this time was to turn off the onscreen objective indicators, which greatly enhanced the immersion.
    There were a couple of places where it was clear the designers expected you to have the indicators on and it became a bit frustrating, but surprisingly enough those moments were few and far between.
    The voice acting is also horrible, but hey, it’s a video game and there are like 3 of those in the world with good acting.
    Overall, an awesome game, and I’m excited to grab the sequel pretty soon.

