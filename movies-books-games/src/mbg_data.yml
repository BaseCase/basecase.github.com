  title: Just Fucking Ship
  type: book
  author: Amy Hoy
  completion_date: 2017-03-05
  image_url: 'img/jfs.png'
  thoughts: >
    A quick, motivating read that feels like a cross between a 37Signals book, <em>The War of Art</em>, and <em>Getting Things Done</em>.
    The core tenet is getting “crispy”, a term the author uses as a slightly more nuanced version of “specific”.
    It’s a great, easy-to-remember idea that can have big impact if applied well.
    I’m excited to get back to work on a side project that’s been languishing for months, using Amy’s ideas.


-
  title: On Web Typography
  type: book
  author: Jason Santa Maria
  completion_date: 2017-03-09
  image_url: 'img/on_web_typography.png'
  thoughts: >
    A pretty good introduction and overview of various typgraphy concepts.
    I appreciate that it’s a slim book that gets to the point quickly.
    As a design beginner, I’m not looking for something comprehensive, I just want to know the lay of the land so I know what to explore further.
    One thing I didn’t appreciate as much is that the book makes frequent references to trusting your gut.
    Maybe someday I can do that, but as a beginner, I haven’t built up the experience to have a reliable gut feeling about typography.
    That’s a minor quibble though; overall a solid intro book.


