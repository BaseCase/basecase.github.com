-
  title: Distrust That Particular Flavor
  type: book
  author: William Gibson
  completion_date: 2017-01-02
  image_url: 'img/distrust_flavor.jpg'
  thoughts: >
    I love William Gibson, and I often enjoy reading the nonfiction of primarily fiction authors, so I figured I'd check out his collection of essays.
    The articles themselves were interesting, though I (unsurprisingly) find Gibson's fiction much more enjoyable.
    What I really liked was that each essay is accompanied by some thoughts from Gibson from his 2012 perspective.
    It was cool to see his thoughts on his own writing from the early and mid-90s.

-
  title: The Gervais Principle
  type: book
  author: Venkatesh Rao
  completion_date: 2017-01-10
  image_url: 'img/gervais_principle.jpg'
  thoughts: >
    This is a collection of blog posts expanded into book form.
    It started as an examination of the TV series <i>The Office</i> in terms of the various organizational pathologies on display, and goes from there into a deep introduction to the concept of Organizational Literacy.
    I can't rightly say I fully understood everything the author talked about, but I was entertained and I am interested in learning more.
    It also made me want to go back and watch all of the <i>Office</i> I missed the first time around.

-
  title: Modern Front-End Development with Ruby on Rails and Puppies
  type: book
  author: Giles Bowkett
  completion_date: 2017-01-11
  image_url: 'img/modern_front_end.jpg'
  thoughts: >
    This book is still in alpha, so it's a bit rough and incomplete, but even so, I got a lot out of it.
    As someone who tends to go depth-first rather than breadth-first on technologies, the web front-end world moves way too fast for me to keep up.
    Giles is able to play the part of trustworthy guide and give a reader like me just enough info to make better decisions.
    The Elm chapter isn't finished yet, and I'm very excited for that to come out, because I've had my eye on Elm for a while now.

