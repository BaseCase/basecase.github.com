---
---

<html>
  <head>
    <title>Casey Brant's blog</title>
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="container">
      <h1>Casey Brant's Blog</h1>
      <table>
        <tr><th class="date">Date</th><th class="title">Title</th></tr>
        {% for post in site.posts %}
        <tr>
          <td class="date">{{ post.post_date }}</td>
          <td class="title"><a href="{{ post.url }}">{{ post.title }}</a></td>
        </tr>
        {% endfor %}
      </table>
    </div>
  </body>
</html>
